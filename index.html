<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>POS_System</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <link rel="scriptsheet" href="script.js">

    <style>

    </style>
</head>
<body>

<div class="border-wrap">
    <div class="card">

        <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 14H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1zm-7-2c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm0-4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1z"/></svg>
        </div>

        <div class="title">Swift POS</div>
        <div class="subtitle">Point of Sale System</div>

        <form class="fields" id="form" novalidate>

            <div class="field">
                <label for="user">Username</label>
                <input id="user" type="text" placeholder="Enter your username" autocomplete="username"/>
            </div>

            <div class="field">
                <label for="pass">Password</label>
                <input id="pass" type="password" placeholder="Enter your password" autocomplete="current-password"/>
            </div>

            <div class="error" id="err">Invalid username or password</div>

            <button class="btn" type="submit" id="btn">Login</button>

        </form>

        <div class="divider"></div>
<!--        <div class="hint">Demo &nbsp;·&nbsp; <b>admin</b> / <b>1234</b></div>-->

    </div>
</div>

<script>

</script>
</body>
</html>
