<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Point Of Sale</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Tac+One&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <link rel="stylesheet" href="assets/styles/style.css"/>

</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-view">
    <div class="login-bg">
        <div class="login-card">

            <div class="login-logo">POS</div>
            <h4 class="login-title">Point of Sale</h4>
            <p class="login-sub">Sign in to continue</p>

            <div class="mb-3">
                <label class="form-label login-label" for="txt-username">Username</label>
                <input type="text"
                       class="form-control login-input"
                       id="txt-username"
                       placeholder="Enter username"/>
            </div>

            <div class="mb-3">
                <label class="form-label login-label" for="txt-password">Password</label>
                <input type="password"
                       class="form-control login-input"
                       id="txt-password"
                       placeholder="Enter password"/>
            </div>

            <div id="login-error" class="login-error-box"></div>

            <button class="btn btn-login w-100" id="btn-login">
                Login
            </button>

        </div>
    </div>
</div>




<!--Dashboard-->
<div id="dashboard-view" style="display:none;">

    <div id="sidebar">

        <div class="sidebar-brand">
            <div class="sidebar-logo">P</div>
            <div>
                <div class="sidebar-name">POINT OF SALE</div>
            </div>
        </div>

        <nav id="sidebar-nav">
            <button class="nav-btn active" id="nav-dashboard"
                    onclick="showPage('dashboard')">
                📊 Dashboard
            </button>
            <button class="nav-btn" id="nav-customers"
                    onclick="showPage('customers')">
                👥 Customers
            </button>
            <button class="nav-btn" id="nav-items"
                    onclick="showPage('items')">
                📦 Items
            </button>
            <button class="nav-btn" id="nav-neworder"
                    onclick="showPage('neworder')">
                🛒 New Order
            </button>
            <button class="nav-btn" id="nav-orderhistory"
                    onclick="showPage('orderhistory')">
                📋 Order History
            </button>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" onclick="logout()">
                🚪 Logout
            </button>
        </div>

    </div>


    <div id="main-content">

        <div id="page-dashboard" class="page-section">

            <div class="page-top">
                <h4 class="page-title">Dashboard</h4>
                <p class="page-sub">Welcome back! Here's a quick overview.</p>
            </div>

            <div class="row g-3 mb-4">

                <div class="col-md-3 col-sm-6">
                    <div class="stat-card">
                        <div>
                            <div class="stat-label">Total Customers</div>
                            <div class="stat-value" id="stat-customers">0</div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="stat-card">
                        <div>
                            <div class="stat-label">Total Items</div>
                            <div class="stat-value" id="stat-items">0</div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="stat-card">
                        <div>
                            <div class="stat-label">Total Orders</div>
                            <div class="stat-value" id="stat-orders">0</div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="stat-card">
                        <div>
                            <div class="stat-label">Total Revenue</div>
                            <div class="stat-value" id="stat-revenue">Rs.0</div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="content-card">

                <div class="content-card-header">
                    <span class="content-card-title">Recent Orders</span>
                    <button class="btn btn-sm btn-outline-secondary"
                            onclick="showPage('orderhistory')">
                        View All
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Date</th>
                        </tr>
                        </thead>
                        <tbody id="dash-recent-tbody">
                        <tr>
                            <td colspan="5" class="empty-row">
                                No orders yet.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>

        </div>


        <div id="page-customers"    class="page-section" style="display:none;"></div>
        <div id="page-items"        class="page-section" style="display:none;"></div>
        <div id="page-neworder"     class="page-section" style="display:none;"></div>
        <div id="page-orderhistory" class="page-section" style="display:none;"></div>

    </div>

</div>





<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="db/db.js"></script>
<script src="util/regex_util.js"></script>

<script src="model/CustomerModel.js"></script>
<script src="model/ItemModel.js"></script>
<script src="model/OrderModel.js"></script>

<script src="controller/AuthController.js"></script>
<script src="controller/CustomerController.js"></script>
<script src="controller/ItemController.js"></script>
<script src="controller/OrderController.js"></script>

</body>
</html>
