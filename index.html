<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Point Of Sale</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Tac+One&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <link rel="stylesheet" href="styles/style.css"/>

</head>
<body>



<section class="bg-container">
    <div class="ball ball1"></div>
    <div class="ball ball2"></div>
    <div class="ball ball3"></div>
</section>


<main class="auth-wrapper">

    <section id="login-card">

        <header class="login-header">

            <div id="logo-icon">P</div>

            <h1 id="app-name">Point Of Sale</h1>

            <div id="divider">
                <span class="divider-line"></span>
                <span class="divider-text">Sign in to your Account</span>
                <span class="divider-line"></span>
            </div>

        </header>

        <form id="login-form">

            <div class="mb-3">
                <label class="form-label" for="username-input">Username</label>
                <input class="form-control"
                       id="username-input"
                       type="text"
                       placeholder="Enter your username"/>
            </div>

            <div class="mb-3">
                <label class="form-label" for="password-input">Password</label>
                <input class="form-control"
                       id="password-input"
                       type="password"
                       placeholder="Enter your password"/>
            </div>

            <div id="message-box"></div>

            <div class="d-grid">
                <button class="btn" id="login-btn" type="button">
                    Login
                </button>
            </div>

        </form>

    </section>

</main>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script  type="module" src="controller/LoginController.js"></script>
<script  type="module" src="controller/CustomerController.js"></script>
<script  type="module" src="controller/ItemController.js"></script>
<script  type="module" src="controller/OrderController.js"></script>

</body>
</html>
