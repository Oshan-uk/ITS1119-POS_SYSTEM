<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>POS_System</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <link rel="scriptsheet" href="script.js">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tac+One&display=swap" rel="stylesheet">


    <style>

    </style>
</head>
<body>

<div class="bg-container">

    <div class="ball ball1"></div>
    <div class="ball ball2"></div>
    <div class="ball ball3"></div>

    <div id="login-card">
        <div id="logo-icon">P</div>
        <div id="app-name">Point Of Sale</div>

        <div id="divider">
            <span class="divider-line"></span>
            <span class="divider-text">Sign in to your Account</span>
            <span class="divider-line"></span>
        </div>

        <form id="login-form">
            <div class="mb-3">
                <label class="form-label" for="username-input">Username</label>
                <input class="form-control" id="username-input" type="text" placeholder="Enter your username"/>
            </div>


            <div class="mb-3">
                <label class="form-label" for="password-input">Password</label>
                <input class="form-control" id="password-input" type="password" placeholder="Enter your password"/>
            </div>


            <div id="message-box">

            </div>

            <div class="d-grid">
                <button class="btn" id="login-btn" type="button">Login</button>
            </div>

        </form>
    </div>

</div>

<script src="assets/lib/jquery-4.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
