<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Point Of Sale</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Tac+One&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <link rel="stylesheet" href="styles/style.css"/>

</head>
<body>

<section class="bg-container">
    <div class="background-effects">
        <div class="ball ball1"></div>
        <div class="ball ball2"></div>
        <div class="ball ball3"></div>
    </div>
</section>

<!-- LOGIN -->
<main class="auth-wrapper" id="loginWrapper">

    <section id="login-card">

        <header class="login-header">
            <div id="logo-icon">P</div>
            <h1 id="app-name">Point Of Sale</h1>
        </header>

        <form id="login-form">

            <div class="mb-3">
                <label for="username-input">Username</label>
                <input id="username-input" class="form-control" type="text">
            </div>

            <div class="mb-3">
                <label for="password-input">Password</label>
                <input id="password-input" class="form-control" type="password">
            </div>

            <div id="message-box"></div>

            <button id="login-btn" type="button" class="btn w-100">
                Login
            </button>

        </form>

    </section>

</main>


<section id="mainPage" style="display:none;">

    <!-- SIDEBAR -->
    <aside id="sidebar">

        <div id="sidebar-logo-icon">P</div>
        <h1 id="sidebar-brand-name">Point Of Sale</h1>
        <button class="nav-btn" onclick="showPage('dashboard')">Dashboard</button>
        <button class="nav-btn" onclick="showPage('customers')">Customers</button>
        <button class="nav-btn" onclick="showPage('items')">Items</button>
        <button class="nav-btn" onclick="showPage('neworder')">New Order</button>
        <button class="nav-btn" onclick="showPage('orderhistory')">Order History</button>

        <button id="logout-btn">Logout</button>

    </aside>

    <main id="main-content">

<!--        next start from here-->
        <section id="page-dashboard">

            <!-- HEADER -->
            <div id="dashboard-header">
                <h2 style="color:white;">Dashboard</h2>
                <p style="color: rgba(255,255,255,0.5);">
                    Welcome back! Here is your system overview.
                </p>
            </div>

            <!-- STATS CARDS -->
            <div id="status-grid">

                <div class="status-card card-purple">
                    <div class="status-card-label">Total Customers</div>
                    <div class="status-card-value" id="totalCustomers">0</div>
                </div>

                <div class="status-card card-blue">
                    <div class="status-card-label">Total Items</div>
                    <div class="status-card-value" id="totalItems">0</div>
                </div>

                <div class="status-card card-amber">
                    <div class="status-card-label">Orders Today</div>
                    <div class="status-card-value" id="totalOrders">0</div>
                </div>

                <div class="status-card card-green">
                    <div class="status-card-label">Revenue</div>
                    <div class="status-card-value" id="totalRevenue">Rs. 0</div>
                </div>

            </div>

            <!-- RECENT ORDERS TABLE -->
            <div id="recent-orders-section">

                <div id="recent-orders-header">
                    <h5 style="color:white;">Recent Orders</h5>
                    <button id="view-all-btn">View All-></button>
                </div>

                <table id="orders-table">
                    <thead>
                    <tr>
                        <th>OID</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Date</th>
                    </tr>
                    </thead>

                    <tbody id="recentOrdersTable">
                    <!-- JS will load data here -->
                    <tr>
                        <td colspan="4" style="text-align:center; color:gray;">
                            No orders yet
                        </td>
                    </tr>
                    </tbody>
                </table>

            </div>

        </section>

        <section id="page-customers" style="display:none;">Customers</section>
        <section id="page-items" style="display:none;">Items</section>
        <section id="page-neworder" style="display:none;">New Order</section>
        <section id="page-orderhistory" style="display:none;">Order History</section>

    </main>

</section>


<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script src="controller/LoginController.js"></script>

</body>
</html>
