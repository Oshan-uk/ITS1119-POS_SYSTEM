<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>POS_System</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <link rel="scriptsheet" href="script.js">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tac+One&display=swap" rel="stylesheet">


    <style>

    </style>
</head>
<body>

<section class="bg-container">

    <div class="background-effects">
        <div class="ball ball1"></div>
        <div class="ball ball2"></div>
        <div class="ball ball3"></div>
    </div>

    <main class="auth-wrapper">

        <section id="login-card" style="display: none;">

            <header class="login-header">

                <div id="logo-icon">P</div>

                <h1 id="app-name">Point Of Sale</h1>

                <div id="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">Sign in to your Account</span>
                    <span class="divider-line"></span>
                </div>

            </header>

            <form id="login-form">

                <div class="form-group">
                    <label class="form-label" for="username-input">Username</label>
                    <input class="form-control" id="username-input"
                           type="text" placeholder="Enter your username"/>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password-input">Password</label>
                    <input class="form-control" id="password-input"
                           type="password" placeholder="Enter your password"/>
                </div>

                <div id="message-box"></div>

                <div class="form-action">
                    <button class="btn" id="login-btn" type="button" onclick="login()">
                        Login
                    </button>
                </div>

            </form>

        </section>

    </main>

</section>





<!-- DASHBOARD SECTION -->
<section id="dashboard" >

    <div class="dashboard-container" style="display: block;">

        <aside class="sidebar">

            <div class="logo-area">
                <div class="logo-icon">P</div>
                <h2 class="logo-text">POINT OF SALE</h2>
            </div>

            <nav class="menu">

                <button class="menu-btn active">Dashboard</button>
                <button class="menu-btn">Customers</button>
                <button class="menu-btn">Items</button>
                <button class="menu-btn">New Order</button>
                <button class="menu-btn">Order History</button>

            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn">Logout</button>
            </div>

        </aside>

        <main class="main-content">

            <header class="dashboard-header">
                <h1>Dashboard</h1>
                <p>Welcome back, here is New Information...</p>
            </header>

            <section class="cards">

                <div class="card">
                    <h5>Total Customers</h5>
                    <h2>53</h2>
                </div>

                <div class="card">
                    <h5>Total Items</h5>
                    <h2>112</h2>
                </div>

                <div class="card">
                    <h5>Orders Today</h5>
                    <h2>12</h2>
                </div>

                <div class="card">
                    <h5>Revenue Today</h5>
                    <h2>Rs.32,800</h2>
                </div>

            </section>

            <section class="orders">

                <div class="orders-header">
                    <h4>Recent Orders</h4>
                    <button class="view-btn">View All →</button>
                </div>

                <table class="table table-dark table-hover">

                    <thead>
                    <tr>
                        <th>OID</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Date</th>
                    </tr>
                    </thead>

                    <tbody id="order-table-body">
                    </tbody>

                </table>

            </section>

        </main>

    </div>

</section>

<script src="script.js"></script>
<script src="assets/lib/jquery-4.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
