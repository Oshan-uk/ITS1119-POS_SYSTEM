<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>POS_System</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tac+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/styles/style.css">
</head>
<body>



<div id="loginView">

    <section class="bg-container">
        <div class="background-effects">
            <div class="ball ball1"></div>
            <div class="ball ball2"></div>
            <div class="ball ball3"></div>
        </div>
    </section>

    <main class="auth-wrapper">
        <section id="login-card">

            <header class="login-header">
                <div id="logo-icon">P</div>
                <h1 id="app-name">Point Of Sale</h1>
                <div id="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">Sign in to your Account</span>
                    <span class="divider-line"></span>
                </div>
            </header>

            <form id="login-form">

                <div class="form-group">
                    <label class="form-label" for="username-input">Username</label>
                    <input class="form-control" id="username-input"
                           type="text" placeholder="Enter your username"/>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password-input">Password</label>
                    <input class="form-control" id="password-input"
                           type="password" placeholder="Enter your password"/>
                </div>

                <div id="message-box"></div>

                <div class="form-action">
                    <button class="btn" id="login-btn"
                            type="button" onclick="login()">
                        Login
                    </button>
                </div>

            </form>

        </section>
    </main>

</div>



<div id="dashboardView" style="display: none;">

    <section class="bg-container">
        <div class="ball ball1"></div>
        <div class="ball ball2"></div>
        <div class="ball ball3"></div>
    </section>

    <aside id="sidebar">

        <div id="sidebar-brand">
            <div id="sidebar-logo-icon">P</div>
            <div id="sidebar-brand-name">POINT OF SALE</div>
        </div>

        <nav id="sidebar-nav" class="d-flex flex-column gap-2">
            <button class="nav-btn w-100 text-start" onclick="showPage('dashboard')">Dashboard</button>
            <button class="nav-btn w-100 text-start" onclick="showPage('customers')">Customers</button>
            <button class="nav-btn w-100 text-start" onclick="showPage('items')">Items</button>
            <button class="nav-btn w-100 text-start" onclick="showPage('neworder')">New Order</button>
            <button class="nav-btn w-100 text-start" onclick="showPage('orderhistory')">Order History</button>
        </nav>

        <div class="sidebar-divider"></div>

        <div id="sidebar-tools">
            <button class="tool-link">🧮 Calculator</button>
            <button class="tool-link">📅 Calendar</button>
        </div>

        <button id="logout-btn" onclick="logout()">→ Logout ←</button>

    </aside>

    <main>

        <section id="page-customers" class="page-section">
        </section>

        <section id="page-items" class="page-section">
        </section>

        <section id="page-neworder" class="page-section">
        </section>

        <section id="page-orderhistory" class="page-section">
        </section>

    </main>

</div>




<script src="db/db.js"></script>

<script src="model/CustomerModel.js"></script>
<script src="model/ItemModel.js"></script>
<script src="model/OrderModel.js"></script>

<script src="controller/AuthController.js"></script>
<script src="controller/CustomerController.js"></script>
<script src="controller/ItemController.js"></script>
<script src="controller/OrderController.js"></script>

<script src="assets/lib/jquery-4.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
